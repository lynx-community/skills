id: detect-background-only
language: tsx
severity: error
message: |
  'lynx.getJSModule' and 'NativeModules' must only be called in background-only contexts:
  - Inside functions marked with 'background only' directive
  - Inside useEffect or useLayoutEffect callbacks
  - Inside useImperativeHandle callbacks
  - Inside ref callbacks
  - Inside event handler functions (bindtap, catchtap)
note: |
  Background-only APIs like lynx.getJSModule and NativeModules should not be called
  during the render phase. They should be called in:
  
  1. Functions with 'background only' directive:
     function doBackgroundWork() {
       'background only';
       lynx.getJSModule('ModuleName');
     }
  
  2. useEffect/useLayoutEffect callbacks:
     useEffect(() => {
       NativeModules.SomeModule.call();
     }, []);
  
  3. useImperativeHandle callbacks:
     useImperativeHandle(ref, () => ({
       doSomething: () => lynx.getJSModule('ModuleName')
     }));
  
  4. Ref callbacks:
     <text ref={(ref) => {
       lynx.getJSModule('ModuleName');
     }} />
  
  5. Event handlers (bindtap/catchtap):
     <view bindtap={handleTap} />
     function handleTap() {
       lynx.getJSModule('ModuleName');
     }
